<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LUCK WORLD - Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060a14;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:8px}
#app{width:100%;max-width:520px;background:#0d1424;border-radius:12px;overflow:hidden;box-shadow:0 0 50px rgba(59,130,246,0.12),0 0 100px rgba(249,115,22,0.06);border:1px solid #1a2744}
.header{background:linear-gradient(135deg,#0c1a3a,#091428);padding:14px 16px;text-align:center;border-bottom:2px solid #2563eb;position:relative}
.header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#f97316,transparent)}
.header h1{color:#fff;font-size:22px;font-weight:900;letter-spacing:5px;text-transform:uppercase}
.header h1 span{color:#f97316;text-shadow:0 0 20px rgba(249,115,22,0.5)}
.header .tagline{color:#60a5fa;font-size:9px;margin-top:3px;letter-spacing:2px;font-weight:600}
.hdr-row{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:6px}
.live-badge{display:inline-block;background:#ef4444;color:#fff;font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;animation:lp 1.5s ease-in-out infinite;letter-spacing:1px}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.4}}
.cdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;box-shadow:0 0 6px #ef4444;transition:all .3s}
.cdot.on{background:#22c55e;box-shadow:0 0 6px #22c55e}
.clabel{color:#64748b;font-size:9px;font-weight:600}
.sec{padding:8px 12px}
.sec-title{color:#60a5fa;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;padding-left:4px}
.coin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.coin-btn{padding:8px 4px;border:2px solid #1a2744;border-radius:8px;background:#091428;color:#64748b;cursor:pointer;text-align:center;transition:all .15s;font-size:11px;font-weight:700;user-select:none;-webkit-tap-highlight-color:transparent}
.coin-btn:active{transform:scale(.95)}
.coin-btn.active{border-color:#f97316;background:#1a1030;color:#f97316;box-shadow:0 0 12px rgba(249,115,22,.25)}
.coin-btn .ci{font-size:16px;display:block;margin-bottom:1px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.sbox{background:#091428;border-radius:8px;padding:6px;text-align:center;border:1px solid #1a2744}
.slbl{color:#64748b;font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.slbl.o{color:#f97316}
.sval{color:#e2e8f0;font-size:14px;font-weight:800;margin-top:1px;font-variant-numeric:tabular-nums}
.sval.bb{border-bottom:2px solid #2563eb}
.sval.ob{border-bottom:2px solid #f97316}
.log-area{margin:0 8px;border-radius:8px;overflow:hidden;border:1px solid #1a2744}
.log-hdr{background:#091428;padding:5px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a2744}
.log-hdr span{color:#64748b;font-size:9px;font-weight:700;display:flex;align-items:center;gap:5px}
.adot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;transition:background .3s}
.adot.err{background:#ef4444}
.lclr{background:none;border:1px solid #1e293b;color:#64748b;font-size:9px;padding:2px 8px;border-radius:4px;cursor:pointer}
.lclr:hover{border-color:#f97316;color:#f97316}
#logOut{height:240px;overflow-y:auto;padding:5px 7px;background:#080c18;font-family:'Courier New',monospace;font-size:9px;line-height:1.4;color:#94a3b8;-webkit-overflow-scrolling:touch}
#logOut::-webkit-scrollbar{width:3px}
#logOut::-webkit-scrollbar-track{background:#080c18}
#logOut::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.lg{color:#22c55e}.lr{color:#ef4444}.ly{color:#eab308}.lc{color:#22d3ee}.lo{color:#f97316}.ld{color:#475569}.lb{color:#60a5fa}
.dsec{padding:0 8px 8px}
.dhdr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid #1a2744;margin-top:2px}
.dtitle{color:#f97316;font-size:10px;font-weight:800;letter-spacing:1px;display:flex;align-items:center;gap:5px}
.dcnt{background:#f97316;color:#060a14;font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px}
.dlbtn{background:#1e3a5f;color:#60a5fa;border:1px solid #2563eb;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700;cursor:pointer}
.dlbtn:hover{background:#2563eb;color:#fff}
.dempty{color:#475569;font-size:9px;text-align:center;padding:16px;font-style:italic}
.dlist{max-height:180px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dlist::-webkit-scrollbar{width:3px}
.dlist::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.fcard{background:linear-gradient(135deg,#0f1d35,#091428);border:1px solid #f97316;border-radius:8px;padding:7px 9px;margin-bottom:5px}
.fr{display:flex;gap:5px;align-items:center;margin-bottom:2px;font-size:9px;flex-wrap:wrap}
.fr:last-child{margin-bottom:0}
.fi{color:#f97316;font-weight:800;min-width:26px}
.fc{color:#60a5fa;font-weight:700}
.ft{color:#eab308;font-weight:700;font-size:8px}
.fb{color:#22c55e;font-weight:700;margin-left:auto;font-size:8px}
.fl{color:#64748b;font-weight:600;min-width:50px;font-size:8px}
.fv{color:#e2e8f0;word-break:break-all;font-size:8px;font-family:'Courier New',monospace}
.sbar{padding:5px 12px;background:#091428;border-top:1px solid #111827}
.sbar .sl{color:#64748b;font-size:9px;font-weight:600}
.sbar .sv{color:#f97316;font-weight:800}
.footer{background:linear-gradient(135deg,#0c1a3a,#091428);padding:10px 16px;text-align:center;border-top:2px solid #f97316;position:relative}
.footer::before{content:'';position:absolute;top:-2px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#2563eb,transparent)}
.footer .fl{color:#64748b;font-size:8px;letter-spacing:2px;text-transform:uppercase}
.footer .fv{color:#f97316;font-size:12px;font-weight:900;letter-spacing:2px;margin-top:2px}
.vbadge{color:#22c55e;font-size:8px;margin-top:3px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>LUCK <span>WORLD</span></h1>
    <div class="tagline">BLOCKCHAIN BALANCE SCANNER</div>
    <div class="hdr-row">
      <span class="live-badge">LIVE</span>
      <span class="cdot" id="cDot"></span>
      <span class="clabel" id="cTxt">Connecting...</span>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Select Coin (tick to display)</div>
    <div class="coin-grid" id="coinGrid">
      <div class="coin-btn active" data-coin="btc" onclick="toggleCoin('btc')"><span class="ci">&#8383;</span>BTC</div>
      <div class="coin-btn" data-coin="eth" onclick="toggleCoin('eth')"><span class="ci">&#926;</span>ETH</div>
      <div class="coin-btn" data-coin="trx" onclick="toggleCoin('trx')"><span class="ci">&#9651;</span>TRX</div>
      <div class="coin-btn" data-coin="bnb" onclick="toggleCoin('bnb')"><span class="ci">&#9670;</span>BNB</div>
      <div class="coin-btn" data-coin="ltc" onclick="toggleCoin('ltc')"><span class="ci">&#321;</span>LTC</div>
      <div class="coin-btn" data-coin="dash" onclick="toggleCoin('dash')"><span class="ci">&#8383;</span>DASH</div>
    </div>
  </div>
  <div class="sec" style="padding-top:0">
    <div class="stats-row">
      <div class="sbox"><div class="slbl">Checked</div><div class="sval bb" id="sC">0</div></div>
      <div class="sbox"><div class="slbl o">Found</div><div class="sval ob" id="sF">0</div></div>
      <div class="sbox"><div class="slbl">API Calls</div><div class="sval bb" id="sA">0</div></div>
    </div>
  </div>
  <div class="log-area">
    <div class="log-hdr">
      <span><span class="adot" id="aDot"></span> Live Stream</span>
      <button class="lclr" onclick="document.getElementById('logOut').innerHTML=''">Clear</button>
    </div>
    <div id="logOut"></div>
  </div>
  <div class="dsec">
    <div class="dhdr">
      <div class="dtitle"><span>&#9733;</span> FOUND DASHBOARD <span class="dcnt" id="dCnt">0</span></div>
      <button class="dlbtn" onclick="dlFound()">&#11015; TXT</button>
    </div>
    <div id="dEmpty" class="dempty">No wallets with balance found yet...</div>
    <div id="dList" class="dlist"></div>
  </div>
  <div class="sbar">
    <span class="sl">Speed: <span class="sv" id="spdV">0</span> addr/sec</span>
  </div>
  <div class="footer">
    <div class="fl">Programmer &amp; Owner</div>
    <div class="fv">CRYPTOGRAPHYTUBE.IN</div>
  </div>
</div>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
var SERVER_URL='https://luckworld-server.onrender.com';
var CS={btc:'BTC',eth:'ETH',trx:'TRX',bnb:'BNB',ltc:'LTC',dash:'DASH'};
var foundData=[];
var selCoins=['btc'];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtB(v){return(v||0).toFixed(8)}
function log(m,c){
    var e=document.getElementById('logOut'),d=document.createElement('div');
    d.style.cssText='margin:0;padding:1px 0';if(c)d.className=c;d.innerHTML=m;
    e.appendChild(d);e.scrollTop=e.scrollHeight;
    while(e.children.length>120)e.removeChild(e.firstChild);
}
function upS(c,f,a){
    document.getElementById('sC').textContent=c.toLocaleString();
    document.getElementById('sF').textContent=f.toLocaleString();
    document.getElementById('sA').textContent=a.toLocaleString();
}
function toggleCoin(coin){
    var i=selCoins.indexOf(coin);
    if(i>=0){if(selCoins.length<=1)return;selCoins.splice(i,1)}
    else selCoins.push(coin);
    document.querySelectorAll('.coin-btn').forEach(function(b){b.classList.toggle('active',selCoins.indexOf(b.dataset.coin)>=0)});
    if(socket&&socket.connected)socket.emit('coins_toggle',{coins:selCoins});
    log('<span class="lc">Display: '+selCoins.map(function(c){return CS[c]}).join(', ')+'</span>');
}

var socket=io(SERVER_URL,{transports:['websocket','polling'],reconnection:true,reconnectionAttempts:Infinity,reconnectionDelay:2000,timeout:20000});

socket.on('connect',function(){
    document.getElementById('cDot').className='cdot on';
    document.getElementById('cTxt').textContent='LIVE';
    log('<span class="lg" style="font-weight:900">CONNECTED TO LIVE SERVER</span>');
    log('<span class="lg">All viewers see same output in real-time</span>');
    log('<span class="lc">6 coins x 2 types (comp+uncomp) = 12 addresses per wallet</span>');
    log('');
});
socket.on('disconnect',function(){
    document.getElementById('cDot').className='cdot';
    document.getElementById('cTxt').textContent='Reconnecting...';
});
socket.on('init',function(d){
    upS(d.checkCount,d.foundCount,d.apiCallCount);
    if(d.selectedCoins&&d.selectedCoins.length){
        selCoins=d.selectedCoins;
        document.querySelectorAll('.coin-btn').forEach(function(b){b.classList.toggle('active',selCoins.indexOf(b.dataset.coin)>=0)});
    }
    if(d.foundData&&d.foundData.length)d.foundData.forEach(function(f){addFC(f)});
});
socket.on('scan',function(d){
    var h='<span class="lb" style="font-weight:700">MNEMONIC</span>  : '+esc(d.mnemonic)+'<br><span class="lb" style="font-weight:700">PRIV KEY</span>   : <span style="color:#fff">'+d.privkey_hex+'</span>';
    var coins=d.coins||{},keys=Object.keys(coins);
    for(var i=0;i<keys.length;i++){
        var c=keys[i];
        h+='<br><span class="lo" style="font-weight:700">--- '+CS[c]+' ---</span>';
        h+='<br><span style="color:#22c55e;font-weight:600">COMP:</span>   '+esc(coins[c].comp_addr);
        h+='<br><span style="color:#eab308;font-weight:600">UNCOMP:</span> '+esc(coins[c].uncomp_addr);
    }
    log(h);upS(d.checkCount,d.foundCount,d.apiCallCount);
});
socket.on('bal',function(d){
    if(selCoins.indexOf(d.coin)<0)return;
    var sym=d.coinSym||CS[d.coin]||d.coin.toUpperCase();
    var tc=d.addrType==='COMP'?'#22c55e':'#eab308';
    if(d.error){
        log('<span style="color:'+tc+';font-weight:600">'+sym+' '+d.addrType+':</span> <span class="ld">API ERROR</span>');
        document.getElementById('aDot').classList.add('err');
        setTimeout(function(){document.getElementById('aDot').classList.remove('err')},2000);
    }else{
        log('<span style="color:'+tc+';font-weight:600">'+sym+' '+d.addrType+':</span> R:'+fmtB(d.received)+' S:'+fmtB(d.sent)+' B:<span class="lg" style="font-weight:700">'+fmtB(d.balance)+'</span> '+sym);
    }
    upS(d.checkCount||0,d.foundCount||0,d.apiCallCount||0);
});
socket.on('found',function(f){
    addFC(f);
    log('<span class="ly">========================================</span>');
    log('<span class="ly" style="font-size:11px;font-weight:900">*** FOUND #'+f.idx+'! '+(f.addrType||'')+' '+f.coin+' B: '+fmtB(f.balance)+' '+f.coinSym+' ***</span>');
    log('<span class="ly">========================================</span>');
});
function addFC(f){
    foundData.push(f);document.getElementById('dEmpty').style.display='none';
    var c=document.createElement('div');c.className='fcard';
    c.innerHTML='<div class="fr"><span class="fi">#'+f.idx+'</span><span class="fc">'+f.coin+'</span>'+(f.addrType?'<span class="ft">['+f.addrType+']</span>':'')+'<span class="fb">'+fmtB(f.balance)+' '+f.coinSym+'</span></div><div class="fr"><span class="fl">MNEMONIC</span><span class="fv">'+esc(f.mnemonic)+'</span></div><div class="fr"><span class="fl">PRIV KEY</span><span class="fv">'+f.privkey_hex+'</span></div><div class="fr"><span class="fl">COMP ADDR</span><span class="fv">'+esc(f.comp_addr)+'</span></div>'+(f.uncomp_addr?'<div class="fr"><span class="fl">UNCOMP ADDR</span><span class="fv">'+esc(f.uncomp_addr)+'</span></div>':'');
    document.getElementById('dList').prepend(c);document.getElementById('dCnt').textContent=foundData.length;
    c.style.boxShadow='0 0 20px rgba(249,115,22,0.6)';setTimeout(function(){c.style.boxShadow='none'},3000);
}
socket.on('speed',function(d){
    document.getElementById('spdV').textContent=d.speed.toLocaleString();
    upS(d.checkCount,d.foundCount,d.apiCallCount);
});
socket.on('log',function(d){log(d.msg)});
socket.on('coins_update',function(d){
    if(d.coins&&Array.isArray(d.coins)){
        selCoins=d.coins;
        document.querySelectorAll('.coin-btn').forEach(function(b){b.classList.toggle('active',selCoins.indexOf(b.dataset.coin)>=0)});
    }
});
function dlFound(){
    if(!foundData.length){log('<span class="lr">No matches yet.</span>');return}
    var t='=== LUCK WORLD - FOUND ===\nDate: '+new Date().toISOString()+'\nTotal: '+foundData.length+'\nOwner: CRYPTOGRAPHYTUBE.IN\n'+'='.repeat(60)+'\n\n';
    foundData.forEach(function(f){t+='MNEMONIC: '+f.mnemonic+'\nPRIV KEY: '+f.privkey_hex+'\nCOIN: '+f.coin+' ('+f.coinSym+') TYPE: '+(f.addrType||'COMP')+'\nCOMP: '+f.comp_addr+'\nUNCOMP: '+(f.uncomp_addr||'N/A')+'\nR:'+fmtB(f.received)+' S:'+fmtB(f.sent)+' B:'+fmtB(f.balance)+' '+f.coinSym+'\n'+'='.repeat(60)+'\n\n'});
    var b=new Blob([t],{type:'text/plain'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='LuckWorld_Found.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
}
</script>
</body>
</html>
