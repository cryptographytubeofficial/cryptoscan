<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LUCK WORLD - Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060a14;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:8px}
#app{width:100%;max-width:540px;background:#0d1424;border-radius:12px;overflow:hidden;box-shadow:0 0 50px rgba(59,130,246,.12),0 0 100px rgba(249,115,22,.06);border:1px solid #1a2744}
.hdr{background:linear-gradient(135deg,#0c1a3a,#091428);padding:14px 16px;text-align:center;border-bottom:2px solid #2563eb;position:relative}
.hdr::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#f97316,transparent)}
.hdr h1{color:#fff;font-size:22px;font-weight:900;letter-spacing:5px;text-transform:uppercase}
.hdr h1 span{color:#f97316;text-shadow:0 0 20px rgba(249,115,22,.5)}
.tag{color:#60a5fa;font-size:9px;margin-top:3px;letter-spacing:2px;font-weight:600}
.hr{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:6px}
.lbd{display:inline-block;background:#ef4444;color:#fff;font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;animation:lp 1.5s ease-in-out infinite;letter-spacing:1px}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.4}}
.cd{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;box-shadow:0 0 6px #ef4444;transition:all .3s}
.cd.on{background:#22c55e;box-shadow:0 0 6px #22c55e}
.cl{color:#64748b;font-size:9px;font-weight:600}
.sec{padding:8px 12px}
.st{color:#60a5fa;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;padding-left:4px}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.cb{padding:8px 4px;border:2px solid #1a2744;border-radius:8px;background:#091428;color:#64748b;cursor:pointer;text-align:center;transition:all .15s;font-size:11px;font-weight:700;user-select:none;-webkit-tap-highlight-color:transparent}
.cb:active{transform:scale(.95)}
.cb.a{border-color:#f97316;background:#1a1030;color:#f97316;box-shadow:0 0 12px rgba(249,115,22,.25)}
.cb .ci{font-size:16px;display:block;margin-bottom:1px}
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.sb{background:#091428;border-radius:8px;padding:6px;text-align:center;border:1px solid #1a2744}
.sl{color:#64748b;font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.sl.o{color:#f97316}
.sv{color:#e2e8f0;font-size:14px;font-weight:800;margin-top:1px;font-variant-numeric:tabular-nums}
.sv.bb{border-bottom:2px solid #2563eb}.sv.ob{border-bottom:2px solid #f97316}
.la{margin:0 8px;border-radius:8px;overflow:hidden;border:1px solid #1a2744}
.lh{background:#091428;padding:5px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a2744}
.lh span{color:#64748b;font-size:9px;font-weight:700;display:flex;align-items:center;gap:5px}
.ad{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;transition:background .3s}
.ad.e{background:#ef4444}
.lc{background:none;border:1px solid #1e293b;color:#64748b;font-size:9px;padding:2px 8px;border-radius:4px;cursor:pointer}
#lo{height:250px;overflow-y:auto;padding:5px 7px;background:#080c18;font-family:'Courier New',monospace;font-size:9px;line-height:1.5;color:#94a3b8;-webkit-overflow-scrolling:touch}
#lo::-webkit-scrollbar{width:3px}#lo::-webkit-scrollbar-track{background:#080c18}#lo::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.lg{color:#22c55e}.lr{color:#ef4444}.ly{color:#eab308}.lc{color:#22d3ee}.lo{color:#f97316}.ld{color:#475569}.lb{color:#60a5fa}
.ds{padding:0 8px 8px}
.dh{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid #1a2744;margin-top:2px}
.dt{color:#f97316;font-size:10px;font-weight:800;letter-spacing:1px;display:flex;align-items:center;gap:5px}
.dc{background:#f97316;color:#060a14;font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px}
.dl{background:#1e3a5f;color:#60a5fa;border:1px solid #2563eb;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700;cursor:pointer}
.dl:hover{background:#2563eb;color:#fff}
.de{color:#475569;font-size:9px;text-align:center;padding:16px;font-style:italic}
.dl2{max-height:180px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dl2::-webkit-scrollbar{width:3px}.dl2::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.fc{background:linear-gradient(135deg,#0f1d35,#091428);border:1px solid #f97316;border-radius:8px;padding:7px 9px;margin-bottom:5px}
.fr{display:flex;gap:5px;align-items:center;margin-bottom:2px;font-size:9px;flex-wrap:wrap}
.fr:last-child{margin-bottom:0}
.fi{color:#f97316;font-weight:800;min-width:26px}.fx{color:#60a5fa;font-weight:700}
.ft{color:#eab308;font-weight:700;font-size:8px}.fb{color:#22c55e;font-weight:700;margin-left:auto;font-size:8px}
.fn{color:#64748b;font-weight:600;min-width:60px;font-size:8px}.fv{color:#e2e8f0;word-break:break-all;font-size:8px;font-family:'Courier New',monospace}
.sp{padding:5px 12px;background:#091428;border-top:1px solid #111827}
.sp .sl{color:#64748b;font-size:9px;font-weight:600}
.sp .sv{color:#f97316;font-weight:800}
.ft2{background:linear-gradient(135deg,#0c1a3a,#091428);padding:10px 16px;text-align:center;border-top:2px solid #f97316;position:relative}
.ft2::before{content:'';position:absolute;top:-2px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#2563eb,transparent)}
.ft2 .fl{color:#64748b;font-size:8px;letter-spacing:2px;text-transform:uppercase}
.ft2 .fv{color:#f97316;font-size:12px;font-weight:900;letter-spacing:2px;margin-top:2px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <h1>LUCK <span>WORLD</span></h1>
    <div class="tag">BLOCKCHAIN BALANCE SCANNER</div>
    <div class="hr"><span class="lbd">LIVE</span><span class="cd" id="cD"></span><span class="cl" id="cT">Connecting...</span></div>
  </div>
  <div class="sec">
    <div class="st">Select Coin (tick to display)</div>
    <div class="cg" id="cG">
      <div class="cb a" data-c="btc" onclick="tog('btc')"><span class="ci">&#8383;</span>BTC</div>
      <div class="cb" data-c="eth" onclick="tog('eth')"><span class="ci">&#926;</span>ETH</div>
      <div class="cb" data-c="trx" onclick="tog('trx')"><span class="ci">&#9651;</span>TRX</div>
      <div class="cb" data-c="bnb" onclick="tog('bnb')"><span class="ci">&#9670;</span>BNB</div>
      <div class="cb" data-c="ltc" onclick="tog('ltc')"><span class="ci">&#321;</span>LTC</div>
      <div class="cb" data-c="dash" onclick="tog('dash')"><span class="ci">&#8383;</span>DASH</div>
    </div>
  </div>
  <div class="sec" style="padding-top:0">
    <div class="sr">
      <div class="sb"><div class="sl">Checked</div><div class="sv bb" id="sC">0</div></div>
      <div class="sb"><div class="sl o">Found</div><div class="sv ob" id="sF">0</div></div>
      <div class="sb"><div class="sl">API Calls</div><div class="sv bb" id="sA">0</div></div>
    </div>
  </div>
  <div class="la">
    <div class="lh"><span><span class="ad" id="aD"></span> Live Stream</span><button class="lc" onclick="document.getElementById('lo').innerHTML=''">Clear</button></div>
    <div id="lo"></div>
  </div>
  <div class="ds">
    <div class="dh"><div class="dt"><span>&#9733;</span> FOUND DASHBOARD <span class="dc" id="dC">0</span></div><button class="dl" onclick="dlF()">&#11015; TXT</button></div>
    <div id="dE" class="de">No wallets with balance found yet...</div>
    <div id="dL" class="dl2"></div>
  </div>
  <div class="sp"><span class="sl">Speed: <span class="sv" id="spV">0</span> addr/sec</span></div>
  <div class="ft2"><div class="fl">Programmer &amp; Owner</div><div class="fv">CRYPTOGRAPHYTUBE.IN</div></div>
</div>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
var SERVER_URL='https://cryptoscan-ooez.onrender.com';
var SYM={btc:'BTC',eth:'ETH',trx:'TRX',bnb:'BNB',ltc:'LTC',dash:'DASH'};
var fd=[];
var sel=['btc'];
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fb(v){return(v||0).toFixed(8)}
function log(m){var e=document.getElementById('lo'),d=document.createElement('div');d.style.cssText='margin:0;padding:1px 0';d.innerHTML=m;e.appendChild(d);e.scrollTop=e.scrollHeight;while(e.children.length>150)e.removeChild(e.firstChild)}
function uS(c,f,a){document.getElementById('sC').textContent=(c||0).toLocaleString();document.getElementById('sF').textContent=(f||0).toLocaleString();document.getElementById('sA').textContent=(a||0).toLocaleString()}
function tog(c){var i=sel.indexOf(c);if(i>=0){if(sel.length<=1)return;sel.splice(i,1)}else sel.push(c);document.querySelectorAll('.cb').forEach(function(b){b.classList.toggle('a',sel.indexOf(b.dataset.c)>=0)});if(socket&&socket.connected)socket.emit('coins_toggle',{coins:sel});log('<span class="lc">Display: '+sel.map(function(c){return SYM[c]}).join(', ')+'</span>')}

var socket=io(SERVER_URL,{transports:['websocket','polling'],reconnection:true,reconnectionAttempts:Infinity,reconnectionDelay:2000,timeout:20000});

socket.on('connect',function(){document.getElementById('cD').className='cd on';document.getElementById('cT').textContent='LIVE';log('<span class="lg" style="font-weight:900">CONNECTED TO LIVE SERVER</span>');log('<span class="lg">All viewers see same output</span>');log('')});
socket.on('disconnect',function(){document.getElementById('cD').className='cd';document.getElementById('cT').textContent='Reconnecting...'});

socket.on('init',function(d){
    uS(d.checkCount,d.foundCount,d.apiCallCount);
    if(d.selCoins&&d.selCoins.length){sel=d.selCoins;document.querySelectorAll('.cb').forEach(function(b){b.classList.toggle('a',sel.indexOf(b.dataset.c)>=0)})}
    if(d.selectedCoins&&d.selectedCoins.length){sel=d.selectedCoins;document.querySelectorAll('.cb').forEach(function(b){b.classList.toggle('a',sel.indexOf(b.dataset.c)>=0)})}
    if(d.foundData&&d.foundData.length)d.foundData.forEach(function(f){aFC(f)});
});

// ============================================================
//  WALLET event - ONE complete block with addresses + balances
// ============================================================
socket.on('wallet',function(d){
    var h='<span class="lb" style="font-weight:700">MNEMONIC</span>  : '+esc(d.mnemonic);
    h+='<br><span class="lb" style="font-weight:700">PRIV KEY</span>   : <span style="color:#fff">'+d.privkey_hex+'</span>';
    var coins=d.coins||{};
    var keys=Object.keys(coins);
    for(var i=0;i<keys.length;i++){
        var c=keys[i];
        var sym=SYM[c]||c.toUpperCase();
        var cd=coins[c];
        var comp=cd.comp||{};
        var uncomp=cd.uncomp||{};
        h+='<br><span class="lo" style="font-weight:700">--- '+sym+' ---</span>';
        // COMP address + balance
        h+='<br><span style="color:#22c55e;font-weight:600">COMP:</span>   '+esc(cd.comp_addr);
        if(comp.error){
            h+=' <span class="ld">[API ERROR]</span>';
        } else {
            h+='<br><span class="ld">R:</span>'+fb(comp.received)+' <span class="ld">S:</span>'+fb(comp.sent)+' <span class="ld">B:</span><span style="color:#22c55e;font-weight:700">'+fb(comp.balance)+'</span> <span class="ld">'+sym+'</span>';
        }
        // UNCOMP address + balance
        h+='<br><span style="color:#eab308;font-weight:600">UNCOMP:</span> '+esc(cd.uncomp_addr);
        if(uncomp.error){
            h+=' <span class="ld">[API ERROR]</span>';
        } else {
            h+='<br><span class="ld">R:</span>'+fb(uncomp.received)+' <span class="ld">S:</span>'+fb(uncomp.sent)+' <span class="ld">B:</span><span style="color:#22c55e;font-weight:700">'+fb(uncomp.balance)+'</span> <span class="ld">'+sym+'</span>';
        }
    }
    log(h);
    uS(d.checkCount,d.foundCount,d.apiCallCount);
});

// BACKWARDS COMPAT: old server scan event
socket.on('scan',function(d){
    if(d.coins&&Object.keys(d.coins).length>0){
        // New format scan - ignore, wallet event will come
        return;
    }
    // Old format - show with separate bal later
    var h='<span class="lb" style="font-weight:700">MNEMONIC</span>  : '+esc(d.mnemonic);
    h+='<br><span class="lb" style="font-weight:700">PRIV KEY</span>   : <span style="color:#fff">'+d.privkey_hex+'</span>';
    if(d.comp_addr){
        var sym=d.coinSym||'';
        h+='<br><span class="lo" style="font-weight:700">--- '+sym+' ---</span>';
        h+='<br><span style="color:#22c55e;font-weight:600">COMP:</span>   '+esc(d.comp_addr);
        h+='<br><span style="color:#eab308;font-weight:600">UNCOMP:</span> '+esc(d.uncomp_addr);
    }
    log(h);uS(d.checkCount,d.foundCount,d.apiCallCount);
});

// BACKWARDS COMPAT: old server balance event
socket.on('balance',function(d){
    var sym=d.coinSym||'';
    if(d.error){log('<span class="ld">'+sym+' Balance: API ERROR</span>')}
    else{log('<span class="lo" style="font-weight:700">'+sym+':</span> R:'+fb(d.received)+' S:'+fb(d.sent)+' B:<span class="lg" style="font-weight:700">'+fb(d.balance)+'</span> '+sym)}
    if(d.checkCount!==undefined)uS(d.checkCount,d.foundCount,d.apiCallCount);
});

// BACKWARDS COMPAT: old server bal event
socket.on('bal',function(d){
    if(sel.indexOf(d.coin)<0)return;
    var sym=d.coinSym||SYM[d.coin]||d.coin.toUpperCase();
    var tc=d.addrType==='COMP'?'#22c55e':'#eab308';
    if(d.error){log('<span style="color:'+tc+';font-weight:700">'+sym+' '+d.addrType+':</span> <span class="ld">API ERROR</span>')}
    else{log('<span style="color:'+tc+';font-weight:700">'+sym+' '+d.addrType+':</span> R:'+fb(d.received)+' S:'+fb(d.sent)+' B:<span class="lg" style="font-weight:700">'+fb(d.balance)+'</span> '+sym)}
    uS(d.checkCount||0,d.foundCount||0,d.apiCallCount||0);
});

// FOUND
socket.on('found',function(f){aFC(f);log('<span class="ly">========================================</span>');log('<span class="ly" style="font-size:11px;font-weight:900">*** FOUND #'+f.idx+'! '+(f.addrType||'')+' '+f.coin+' B:'+fb(f.balance)+' '+f.coinSym+' ***</span>');log('<span class="ly">========================================</span>')});

function aFC(f){
    fd.push(f);document.getElementById('dE').style.display='none';
    var c=document.createElement('div');c.className='fc';
    var h='<div class="fr"><span class="fi">#'+f.idx+'</span><span class="fx">'+f.coin+'</span>';
    if(f.addrType)h+='<span class="ft">['+f.addrType+']</span>';
    h+='<span class="fb">'+fb(f.balance)+' '+f.coinSym+'</span></div>';
    h+='<div class="fr"><span class="fn">MNEMONIC</span><span class="fv">'+esc(f.mnemonic)+'</span></div>';
    h+='<div class="fr"><span class="fn">PRIV KEY</span><span class="fv">'+f.privkey_hex+'</span></div>';
    h+='<div class="fr"><span class="fn">COMP ADDR</span><span class="fv">'+esc(f.comp_addr)+'</span></div>';
    if(f.uncomp_addr)h+='<div class="fr"><span class="fn">UNCOMP ADDR</span><span class="fv">'+esc(f.uncomp_addr)+'</span></div>';
    c.innerHTML=h;document.getElementById('dL').prepend(c);
    document.getElementById('dC').textContent=fd.length;
    c.style.boxShadow='0 0 20px rgba(249,115,22,0.6)';setTimeout(function(){c.style.boxShadow='none'},3000);
}

socket.on('speed',function(d){document.getElementById('spV').textContent=(d.speed||0).toLocaleString();uS(d.checkCount,d.foundCount,d.apiCallCount)});
socket.on('log',function(d){log(d.msg)});
socket.on('coins_update',function(d){if(d.coins&&Array.isArray(d.coins)){sel=d.coins;document.querySelectorAll('.cb').forEach(function(b){b.classList.toggle('a',sel.indexOf(b.dataset.c)>=0)})}});
socket.on('coin_update',function(d){if(d.coin){sel=[d.coin];document.querySelectorAll('.cb').forEach(function(b){b.classList.toggle('a',b.dataset.c===d.coin)})}});

function dlF(){
    if(!fd.length){log('<span class="lr">No matches yet.</span>');return}
    var t='=== LUCK WORLD - FOUND ===\nDate: '+new Date().toISOString()+'\nTotal: '+fd.length+'\nOwner: CRYPTOGRAPHYTUBE.IN\n'+'='.repeat(60)+'\n\n';
    fd.forEach(function(f){t+='MNEMONIC: '+f.mnemonic+'\nPRIV KEY: '+f.privkey_hex+'\nCOIN: '+f.coin+' ('+f.coinSym+') TYPE: '+(f.addrType||'COMP')+'\nCOMP: '+f.comp_addr+'\n';if(f.uncomp_addr)t+='UNCOMP: '+f.uncomp_addr+'\n';t+='R:'+fb(f.received)+' S:'+fb(f.sent)+' B:'+fb(f.balance)+' '+f.coinSym+'\n'+'='.repeat(60)+'\n\n'});
    var b=new Blob([t],{type:'text/plain'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='LuckWorld_Found.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
}
</script>
</body>
</html>
